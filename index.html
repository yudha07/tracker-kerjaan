<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PT Gatras & Cv Intim Project Tracker Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>
<body class="bg-[#F8F9FD] text-[#1E293B] min-h-screen flex items-center justify-center antialiased">

  <div id="login-panel" class="bg-white p-8 rounded-3xl shadow-xl shadow-blue-100/40 border border-slate-100 w-full max-w-md mx-4">
    <div class="flex justify-center mb-4">
      <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-white text-xl font-bold shadow-lg shadow-blue-500/30">P</div>
    </div>
    <h2 class="text-2xl font-bold text-center text-slate-800 mb-1">PT Gatras & Cv Intim Project Tracker Dashboard</h2>
    <p class="text-sm text-slate-400 text-center mb-6">Silakan masukkan nama Anda untuk masuk ke sistem</p>
    
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-slate-500 tracking-wider mb-1.5 uppercase">Nama Pegawai</label>
        <input type="text" id="usernameInput" placeholder="Ketik nama Anda di sini..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-800 focus:outline-none focus:border-blue-500 focus:bg-white transition-all">
      </div>
      <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-all shadow-lg shadow-blue-500/20 cursor-pointer">Masuk ke System</button>
    </div>
  </div>

  <div id="main-tracker" class="w-full min-h-screen flex hidden">
    
    <aside class="w-64 bg-white border-r border-slate-100 flex flex-col justify-between p-6 shrink-0 hidden md:flex">
      <div class="space-y-8">
        <div class="flex items-center gap-3 px-2">
          <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white text-base font-bold shadow-md shadow-blue-500/20">P</div>
          <span class="font-bold text-slate-800 text-base tracking-tight">Pt.Gatras & Cv Intim Project Tracker</span>
        </div>
        
        <nav class="space-y-1">
         
          <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-sm font-bold text-blue-600 bg-blue-50/60 rounded-xl transition-all">📋 <span class="text-xs">Boards</span></a>
          <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-sm font-semibold text-slate-400 hover:text-slate-600 transition-all">📂 <span class="text-xs">Projects</span></a>
          
        </nav>
      </div>

      <div class="bg-slate-50 border border-slate-100 p-3.5 rounded-2xl flex items-center justify-between gap-2">
        <div class="flex items-center gap-2.5 overflow-hidden">
          <div class="w-9 h-9 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-white text-sm font-bold uppercase shrink-0" id="avatarLetter">Y</div>
          <div class="truncate">
            <p class="text-xs font-bold text-slate-800 truncate" id="currentUserDisplay"></p>
            <p class="text-[10px] text-green-500 font-medium flex items-center gap-1">● Online</p>
          </div>
        </div>
        <button onclick="handleLogout()" class="text-xs hover:bg-slate-200 p-1.5 rounded-lg text-slate-400 hover:text-red-500 transition-all cursor-pointer" title="Keluar">🚪</button>
      </div>
    </aside>

    <main class="flex-1 p-4 md:p-8 flex flex-col overflow-x-hidden">
      
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
          <h1 id="customTitle" class="text-2xl font-bold text-slate-800 tracking-tight">Dashboards</h1>
          <p class="text-xs text-slate-400 mt-0.5">Gatras & Intim Project Tracker</p>
        </div>
        
        <div class="flex items-center gap-2 max-w-md w-full sm:w-auto">
          <div class="relative flex-1 sm:w-64">
            <input type="text" id="taskInput" placeholder="Tambah kerjaan baru..." class="w-full bg-white border border-slate-200/80 rounded-xl pl-4 pr-4 py-2 text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:shadow-sm transition-all placeholder:text-slate-400">
          </div>
          <button onclick="addTask()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm px-4 py-2 rounded-xl shadow-md shadow-blue-500/10 transition-all shrink-0 cursor-pointer flex items-center gap-1.5">
            <span>+</span> Add task
          </button>
          <button onclick="handleLogout()" class="md:hidden bg-white border border-slate-200 p-2 rounded-xl text-slate-500">🚪</button>
        </div>
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 mb-8">
        <div class="bg-white border border-slate-100 p-4 rounded-2xl flex items-center gap-3">
         
        </div>
        <div class="bg-white border border-slate-100 p-4 rounded-2xl flex items-center gap-3">
          <div class="text-xl">⏱️</div>
          
        </div>
        <div class="bg-white border border-slate-100 p-4 rounded-2xl col-span-2 sm:col-span-1 flex items-center gap-3">
          <div class="text-xl">📈</div>
          
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 flex-1 items-start">
        <div class="bg-[#FFF9F2] p-4 rounded-2xl border border-[#FFEEDB] flex flex-col max-h-[70vh] overflow-y-auto">
          <h2 class="text-xs font-bold text-[#D97706] uppercase tracking-wider mb-4 flex items-center justify-between px-1">
            <span>To do</span>
            <span id="todo-count" class="bg-[#FFEEDB] text-[#B45309] text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
          </h2>
          <div id="todo-list" class="space-y-3"></div>
        </div>

        <div class="bg-[#F3F1FA] p-4 rounded-2xl border border-[#E6E1F5] flex flex-col max-h-[70vh] overflow-y-auto">
          <h2 class="text-xs font-bold text-[#6366F1] uppercase tracking-wider mb-4 flex items-center justify-between px-1">
            <span>In progress</span>
            <span id="inprogress-count" class="bg-[#E6E1F5] text-[#4F46E5] text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
          </h2>
          <div id="inprogress-list" class="space-y-3"></div>
        </div>

        <div class="bg-[#FDF2F4] p-4 rounded-2xl border border-[#FCE3E7] flex flex-col max-h-[70vh] overflow-y-auto">
          <h2 class="text-xs font-bold text-[#EC4899] uppercase tracking-wider mb-4 flex items-center justify-between px-1">
            <span>Done</span>
            <span id="done-count" class="bg-[#FCE3E7] text-[#DB2777] text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
          </h2>
          <div id="done-list" class="space-y-3"></div>
        </div>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
