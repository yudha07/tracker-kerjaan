<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOB TRACKER GATRAS & INTIM</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans p-4 flex flex-col items-center justify-center">

  <div id="login-panel" class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 w-full max-w-md">
    <h2 class="text-xl font-bold text-center text-blue-400 mb-2">📋 GATRAS & INTIM PROJECT TRACKER</h2>
    <p class="text-xs text-gray-400 text-center mb-6">Silakan masukkan nama Anda untuk mulai bekerja</p>
    
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-gray-400 mb-1">NAMA PEGAWAI</label>
        <input type="text" id="usernameInput" placeholder="Contoh: Yudha, Andi, dll..." class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500">
      </div>
      <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 font-semibold py-2.5 rounded-lg transition">Masuk ke System</button>
    </div>
  </div>

  <div id="main-tracker" class="w-full max-w-4xl hidden">
    <div class="flex flex-col sm:flex-row justify-between items-center bg-gray-800 p-4 rounded-xl border border-gray-700 mb-6 gap-4">
      <div>
        <h1 class="text-xl font-bold text-blue-400">📊 Gatras & Intim Project Tracker</h1>
        <p class="text-xs text-gray-400">Pegawai Aktif: <span id="currentUserDisplay" class="text-green-400 font-bold"></span></p>
      </div>
      <button onclick="handleLogout()" class="text-xs bg-red-900/50 hover:bg-red-900 text-red-300 px-3 py-1.5 rounded-lg border border-red-700 transition">Logout / Ganti User</button>
    </div>

    <div class="flex gap-2 mb-8">
      <input type="text" id="taskInput" placeholder="Tambah kerjaan baru..." class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500 shadow-inner">
      <button onclick="addTask()" class="bg-blue-600 hover:bg-blue-500 text-white font-semibold px-6 py-2 rounded-lg shadow transition">Tambah</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="bg-gray-800/60 p-4 rounded-xl border border-gray-700/50 shadow-lg">
        <h2 class="text-sm font-bold text-red-400 uppercase tracking-wider mb-4 flex items-center gap-2">🔴 Belum Dikerjakan</h2>
        <div id="todo-list" class="space-y-3"></div>
      </div>

      <div class="bg-gray-800/60 p-4 rounded-xl border border-gray-700/50 shadow-lg">
        <h2 class="text-sm font-bold text-yellow-400 uppercase tracking-wider mb-4 flex items-center gap-2">🟡 Sementara Berjalan</h2>
        <div id="inprogress-list" class="space-y-3"></div>
      </div>

      <div class="bg-gray-800/60 p-4 rounded-xl border border-gray-700/50 shadow-lg">
        <h2 class="text-sm font-bold text-green-400 uppercase tracking-wider mb-4 flex items-center gap-2">🟢 Selesai</h2>
        <div id="done-list" class="space-y-3"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
